<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tap Wars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* Экран выбора игры */
        .selector-screen {
            display: block;
        }
        
        .selector-screen.hide {
            display: none;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 32px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        
        .game-card:active {
            transform: scale(0.98);
        }
        
        .game-card.mini {
            border-left: 5px solid #00b894;
        }
        
        .game-card.standard {
            border-left: 5px solid #0984e3;
        }
        
        .game-card.vip {
            border-left: 5px solid #6c5ce7;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .game-title {
            font-size: 24px;
            font-weight: bold;
        }
        
        .game-price {
            font-size: 20px;
            font-weight: bold;
            background: #fdcb6e;
            padding: 5px 12px;
            border-radius: 20px;
            color: #2d3436;
        }
        
        .game-stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #2d3436;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        
        .prize {
            color: #00b894;
        }
        
        .game-description {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        .join-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
        }
        
        .join-btn:active {
            transform: scale(0.98);
        }
        
        /* Экран игры */
        .game-screen {
            display: none;
        }
        
        .game-screen.active {
            display: block;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .player-info {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 14px;
        }
        
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.9);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #2d3436;
        }
        
        .timer {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            color: #fdcb6e;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .game-status {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .game-status.waiting {
            background: #ffeaa7;
            color: #d63031;
        }
        
        .game-status.playing {
            background: #55efc4;
            color: #006266;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        .game-status.ended {
            background: #dfe6e9;
            color: #2d3436;
        }
        
        .tap-area {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.05s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .tap-area:active {
            transform: scale(0.95);
        }
        
        .score {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: white;
        }
        
        .leaderboard {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .leaderboard h3 {
            margin-bottom: 10px;
            text-align: center;
            color: #2d3436;
        }
        
        .leaderboard-list {
            max-height: 250px;
            overflow-y: auto;
        }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        
        button {
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .buy-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .share-btn {
            background: linear-gradient(135deg, #00b894 0%, #55efc4 100%);
        }
        
        .restart-btn {
            background: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Экран выбора игры -->
        <div id="selector-screen" class="selector-screen">
            <h1>⚡ TAP WARS ⚡</h1>
            <div id="games-list"></div>
        </div>
        
        <!-- Экран игры -->
        <div id="game-screen" class="game-screen">
            <button class="back-btn" id="back-btn">← Назад</button>
            
            <div class="player-info" id="player-info"></div>
            
            <div class="stats-panel">
                <div class="stat">
                    <div class="stat-label">💰 Баланс</div>
                    <div class="stat-value" id="balance">0 ⭐</div>
                </div>
                <div class="stat">
                    <div class="stat-label">👥 Игроки</div>
                    <div class="stat-value"><span id="players-count">0</span>/<span id="max-players">0</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">🏆 Приз</div>
                    <div class="stat-value" id="prize-pool">0 ⭐</div>
                </div>
            </div>
            
            <div class="timer" id="timer">⏱️ 00:00</div>
            
            <div class="game-status waiting" id="game-status">⏳ Ожидание игроков...</div>
            
            <div class="tap-area" id="tap-area">👆</div>
            
            <div class="score">🎯 Счёт: <span id="score">0</span></div>
            
            <button class="buy-btn" id="buy-ticket-btn" style="display: none;">🎫 Купить билет</button>
            
            <div class="leaderboard">
                <h3>🏆 Топ игроков</h3>
                <div class="leaderboard-list" id="leaderboard-list">Загрузка...</div>
            </div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 10000);
        const username = tg.initDataUnsafe?.user?.username || 'Player';
        const firstName = tg.initDataUnsafe?.user?.first_name || '';
        const lastName = tg.initDataUnsafe?.user?.last_name || '';
        const fullName = (firstName + ' ' + lastName).trim() || username;
        
        let selectedGameType = null;
        let selectedGameConfig = null;
        let currentGameId = null;
        let score = 0;
        let gameActive = false;
        let hasTicket = false;
        let timeLeft = 60;
        let timerInterval = null;
        let gameStarted = false;
        
        // Элементы DOM
        const selectorScreen = document.getElementById('selector-screen');
        const gameScreen = document.getElementById('game-screen');
        const gamesList = document.getElementById('games-list');
        const backBtn = document.getElementById('back-btn');
        const tapArea = document.getElementById('tap-area');
        const scoreSpan = document.getElementById('score');
        const timerSpan = document.getElementById('timer');
        const gameStatusSpan = document.getElementById('game-status');
        const playersCountSpan = document.getElementById('players-count');
        const maxPlayersSpan = document.getElementById('max-players');
        const prizePoolSpan = document.getElementById('prize-pool');
        const buyTicketBtn = document.getElementById('buy-ticket-btn');
        const leaderboardDiv = document.getElementById('leaderboard-list');
        const playerInfoSpan = document.getElementById('player-info');
        
        playerInfoSpan.innerHTML = `👤 ${fullName} (@${username})`;
        
        // Загрузка типов игр
        async function loadGameTypes() {
            try {
                const response = await fetch('/api/game/types');
                const data = await response.json();
                displayGames(data.types);
            } catch(e) {
                console.error('Error:', e);
                // Запасной вариант - локальные данные
                displayGames({
                    mini: { name: "Мини", emoji: "🟢", ticket_price: 10, max_players: 10, prize_pool: 60, duration: 30, description: "Быстрая игра" },
                    standard: { name: "Стандарт", emoji: "🔵", ticket_price: 50, max_players: 20, prize_pool: 750, duration: 60, description: "Классическая битва" },
                    vip: { name: "VIP", emoji: "🟣", ticket_price: 100, max_players: 10, prize_pool: 750, duration: 60, description: "Элитная игра" }
                });
            }
        }
        
        function displayGames(types) {
            gamesList.innerHTML = '';
            
            const order = ['mini', 'standard', 'vip'];
            for (const key of order) {
                if (!types[key]) continue;
                const config = types[key];
                const card = document.createElement('div');
                card.className = `game-card ${key}`;
                card.innerHTML = `
                    <div class="game-header">
                        <span class="game-title">${config.emoji} ${config.name}</span>
                        <span class="game-price">${config.ticket_price} ⭐</span>
                    </div>
                    <div class="game-stats">
                        <div class="stat-item">
                            <div class="stat-value">${config.max_players}</div>
                            <div class="stat-label">игроков</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value prize">${config.prize_pool} ⭐</div>
                            <div class="stat-label">призовой фонд</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${config.duration} сек</div>
                            <div class="stat-label">длительность</div>
                        </div>
                    </div>
                    <div class="game-description">${config.description}</div>
                    <button class="join-btn" data-type="${key}">Выбрать</button>
                `;
                
                const joinBtn = card.querySelector('.join-btn');
                joinBtn.onclick = () => selectGame(key, config);
                
                gamesList.appendChild(card);
            }
        }
        
        async function selectGame(type, config) {
            selectedGameType = type;
            selectedGameConfig = config;
            
            try {
                const response = await fetch('/api/game/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ game_type: type })
                });
                const data = await response.json();
                currentGameId = data.game_id;
            } catch(e) {
                currentGameId = Date.now();
            }
            
            await checkTicket();
            
            selectorScreen.classList.add('hide');
            gameScreen.classList.add('active');
            
            maxPlayersSpan.textContent = config.max_players;
            prizePoolSpan.textContent = config.prize_pool;
            timeLeft = config.duration;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerSpan.textContent = `⏱️ ${mins}:${secs.toString().padStart(2, '0')}`;
            
            await getCurrentGame();
            updateGameInfoInterval = setInterval(updateGameInfo, 2000);
        }
        
        async function checkTicket() {
            hasTicket = false;
            if (!hasTicket) {
                buyTicketBtn.style.display = 'block';
                buyTicketBtn.textContent = `🎫 Купить билет (${selectedGameConfig.ticket_price} ⭐)`;
                buyTicketBtn.classList.remove('disabled');
                tapArea.style.opacity = '0.5';
                tapArea.style.pointerEvents = 'none';
            } else {
                buyTicketBtn.style.display = 'none';
                tapArea.style.opacity = '1';
                tapArea.style.pointerEvents = 'auto';
                await joinGame();
            }
        }
        
        buyTicketBtn.onclick = async () => {
            if (buyTicketBtn.classList.contains('disabled')) return;
            buyTicketBtn.classList.add('disabled');
            buyTicketBtn.textContent = '⏳ Обработка...';
            
            try {
                const response = await fetch('/api/payment/create-invoice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        game_id: currentGameId,
                        amount: selectedGameConfig.ticket_price
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.invoice_link) {
                    tg.openInvoice(data.invoice_link, async (status) => {
                        if (status === 'paid') {
                            tg.showAlert('✅ Билет куплен!');
                            hasTicket = true;
                            buyTicketBtn.style.display = 'none';
                            tapArea.style.opacity = '1';
                            tapArea.style.pointerEvents = 'auto';
                            await joinGame();
                        } else {
                            buyTicketBtn.classList.remove('disabled');
                            buyTicketBtn.textContent = `🎫 Купить билет (${selectedGameConfig.ticket_price} ⭐)`;
                        }
                    });
                } else {
                    tg.showAlert('❌ Ошибка при создании инвойса');
                    buyTicketBtn.classList.remove('disabled');
                    buyTicketBtn.textContent = `🎫 Купить билет (${selectedGameConfig.ticket_price} ⭐)`;
                }
            } catch(e) {
                console.error('Buy ticket error:', e);
                tg.showAlert('❌ Ошибка соединения');
                buyTicketBtn.classList.remove('disabled');
                buyTicketBtn.textContent = `🎫 Купить билет (${selectedGameConfig.ticket_price} ⭐)`;
            }
        };
        
        async function joinGame() {
            try {
                const response = await fetch(`/api/game/${currentGameId}/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await response.json();
                if (data.success) {
                    if (data.players_count >= selectedGameConfig.max_players && !gameStarted) {
                        startGame();
                    }
                }
            } catch(e) {
                console.error('Join error:', e);
            }
        }
        
        function startGame() {
            gameActive = true;
            gameStarted = true;
            gameStatusSpan.className = 'game-status playing';
            gameStatusSpan.innerHTML = '🎮 ИГРА ИДЁТ! ТАПАЙ! 🎮';
            startTimer();
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                
                if (timeLeft > 0) {
                    timeLeft--;
                    const mins = Math.floor(timeLeft / 60);
                    const secs = timeLeft % 60;
                    timerSpan.textContent = `⏱️ ${mins}:${secs.toString().padStart(2, '0')}`;
                }
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }
        
        async function endGame() {
            gameActive = false;
            gameStarted = false;
            if (timerInterval) clearInterval(timerInterval);
            tapArea.style.pointerEvents = 'none';
            tapArea.style.opacity = '0.5';
            gameStatusSpan.className = 'game-status ended';
            gameStatusSpan.innerHTML = '🏁 Игра окончена! 🏁';
            
            await updateScore();
            tg.showAlert(`🏁 Игра окончена!\n📊 Ваш результат: ${score} тапов!`);
        }
        
        async function updateScore() {
            try {
                await fetch('/api/update-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_id: userId, 
                        username: username,
                        full_name: fullName,
                        score: score 
                    })
                });
            } catch(e) {
                console.error('Update error:', e);
            }
        }
        
        async function getCurrentGame() {
            try {
                const response = await fetch('/api/game/current');
                const data = await response.json();
                playersCountSpan.textContent = data.players_count || 0;
                return data;
            } catch(e) {
                console.error('Get game error:', e);
            }
        }
        
        let updateGameInfoInterval = null;
        async function updateGameInfo() {
            const game = await getCurrentGame();
            if (game && game.players_count >= selectedGameConfig.max_players && !gameStarted) {
                startGame();
            }
        }
        
        async function getLeaderboard() {
            try {
                const response = await fetch('/api/leaderboard');
                const data = await response.json();
                if (data.leaders) {
                    leaderboardDiv.innerHTML = '';
                    data.leaders.slice(0, 10).forEach((player, index) => {
                        const item = document.createElement('div');
                        item.className = 'leaderboard-item';
                        let medal = '';
                        if (index === 0) medal = '🥇 ';
                        else if (index === 1) medal = '🥈 ';
                        else if (index === 2) medal = '🥉 ';
                        item.innerHTML = `
                            <span>${medal}${index + 1}. ${player.full_name || player.username}</span>
                            <span>${player.score || 0} 👆</span>
                        `;
                        leaderboardDiv.appendChild(item);
                    });
                }
            } catch(e) {
                console.error('Leaderboard error:', e);
            }
        }
        
        tapArea.addEventListener('click', () => {
            if (!gameActive) return;
            score++;
            scoreSpan.textContent = score;
            
            tapArea.style.transform = 'scale(0.95)';
            setTimeout(() => {
                tapArea.style.transform = 'scale(1)';
            }, 100);
            
            if (score % 10 === 0) updateScore();
        });
        
        backBtn.onclick = () => {
            if (timerInterval) clearInterval(timerInterval);
            if (updateGameInfoInterval) clearInterval(updateGameInfoInterval);
            gameActive = false;
            gameStarted = false;
            score = 0;
            scoreSpan.textContent = '0';
            selectorScreen.classList.remove('hide');
            gameScreen.classList.remove('active');
            loadGameTypes();
        };
        
        loadGameTypes();
        setInterval(getLeaderboard, 3000);
    </script>
</body>
</html>
