<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap Wars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Экран загрузки -->
        <div id="loading-screen" class="screen active">
            <div class="loader"></div>
            <p>Loading Tap Wars...</p>
        </div>

        <!-- Главное меню -->
        <div id="menu-screen" class="screen">
            <div class="header">
                <h1>⚔️ TAP WARS</h1>
                <div class="user-info">
                    <span id="username"></span>
                    <span id="balance">0 ⭐</span>
                </div>
            </div>

            <div class="menu-buttons">
                <button class="btn-primary" onclick="startGame()">
                    🎮 ИГРАТЬ
                </button>
                <button class="btn-secondary" onclick="showLeaderboard()">
                    🏆 ТОП ИГРОКОВ
                </button>
                <button class="btn-secondary" onclick="showProfile()">
                    👤 ПРОФИЛЬ
                </button>
                <button class="btn-secondary" onclick="showReferrals()">
                    👥 ПРИГЛАСИТЬ ДРУЗЕЙ
                </button>
            </div>
        </div>

        <!-- Лобби игры -->
        <div id="lobby-screen" class="screen">
            <div class="lobby-header">
                <h2>⏳ Ожидание игроков</h2>
                <p id="lobby-players">0 / 50</p>
            </div>

            <div class="lobby-info">
                <div class="info-card">
                    <span>💰 Призовой фонд</span>
                    <strong id="prize-pool">0 ⭐</strong>
                </div>
                <div class="info-card">
                    <span>🎟 Цена билета</span>
                    <strong>50 ⭐</strong>
                </div>
            </div>

            <div class="lobby-prizes">
                <h3>🏆 Призы</h3>
                <div class="prize-list">
                    <div class="prize-item">🥇 1 место — 40%</div>
                    <div class="prize-item">🥈 2 место — 25%</div>
                    <div class="prize-item">🥉 3 место — 15%</div>
                </div>
            </div>

            <button class="btn-cancel" onclick="leaveLobby()">Назад</button>
        </div>

        <!-- Игровой экран -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="timer" id="game-timer">60</div>
                <div class="my-taps">
                    <span>Твои тапы:</span>
                    <strong id="my-taps-count">0</strong>
                </div>
            </div>

            <!-- Canvas для анимации -->
            <canvas id="game-canvas"></canvas>

            <!-- Кнопка тапа -->
            <div class="tap-zone">
                <button id="tap-button" class="tap-btn">
                    👆 TAP!
                </button>
                <div id="tap-counter">+0</div>
            </div>

            <!-- Бусты -->
            <div class="boosts">
                <button class="boost-btn" onclick="activateBoost('2x')">
                    ⚡ x2<br><span>10 ⭐</span>
                </button>
                <button class="boost-btn" onclick="activateBoost('3x')">
                    🔥 x3<br><span>25 ⭐</span>
                </button>
                <button class="boost-btn" onclick="activateBoost('turbo')">
                    🚀 x5<br><span>15 ⭐</span>
                </button>
            </div>

            <!-- Мини-лидерборд -->
            <div class="mini-leaderboard">
                <h4>📊 ТОП-5</h4>
                <div id="live-leaderboard"></div>
            </div>
        </div>

        <!-- Экран результатов -->
        <div id="results-screen" class="screen">
            <div class="results-header">
                <h2 id="result-title">🎉 ИГРА ЗАВЕРШЕНА!</h2>
            </div>

            <div class="result-card">
                <div class="my-result">
                    <span>Твоё место</span>
                    <strong id="my-position">#1</strong>
                </div>
                <div class="my-result">
                    <span>Тапов</span>
                    <strong id="my-final-taps">1250</strong>
                </div>
                <div class="my-result prize">
                    <span>Выигрыш</span>
                    <strong id="my-prize">500 ⭐</strong>
                </div>
            </div>

            <div class="winners-list" id="winners-list"></div>

            <button class="btn-primary" onclick="backToMenu()">
                🎮 ИГРАТЬ ЕЩЁ
            </button>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="game.js"></script>
</body>
</html>
