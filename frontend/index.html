<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tap Wars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 32px;
        }
        .game-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .game-card:active {
            transform: scale(0.98);
        }
        .game-card.mini { border-left: 5px solid #00b894; }
        .game-card.standard { border-left: 5px solid #0984e3; }
        .game-card.vip { border-left: 5px solid #6c5ce7; }
        .game-card.duel { border-left: 5px solid #e17055; }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .game-title {
            font-size: 24px;
            font-weight: bold;
        }
        .game-price {
            background: #fdcb6e;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .game-stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            color: #666;
        }
        .join-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .selector-screen {
            display: block;
        }
        .selector-screen.hide {
            display: none;
        }
        .game-screen {
            display: none;
        }
        .game-screen.active {
            display: block;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .tap-area {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .tap-area:active {
            transform: scale(0.95);
        }
        .score {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: white;
        }
        .score span {
            font-size: 48px;
            color: #fdcb6e;
        }
        .timer {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            color: #fdcb6e;
        }
        .game-status {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-weight: bold;
        }
        .game-status.waiting {
            background: #ffeaa7;
            color: #d63031;
        }
        .game-status.playing {
            background: #55efc4;
            color: #006266;
        }
        .game-status.ended {
            background: #dfe6e9;
            color: #2d3436;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.9);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .leaderboard {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }
        .leaderboard h3 {
            text-align: center;
            margin-bottom: 10px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        .buy-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .buy-ton-btn {
            background: linear-gradient(135deg, #0098ea 0%, #0066cc 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
        .ton-connect-btn {
            background: #0098ea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            margin-left: 10px;
        }
        .wallet-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            color: white;
        }
        .wallet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .wallet-balance {
            font-size: 28px;
            font-weight: bold;
        }
        .withdraw-btn {
            background: #ffd700;
            color: #2d3436;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="selector-screen" class="selector-screen">
            <h1>⚡ TAP WARS ⚡</h1>
            <div id="games-list"></div>
        </div>
        
        <div id="game-screen" class="game-screen">
            <button class="back-btn" id="back-btn">← Назад к выбору</button>
            
            <div class="wallet-panel">
                <div class="wallet-header">
                    <span>💰 Мой кошелёк</span>
                    <div>
                        <button class="ton-connect-btn" id="ton-connect-btn">🔗 TON Wallet</button>
                        <button class="withdraw-btn" id="withdraw-btn">💸 Вывести</button>
                    </div>
                </div>
                <div class="wallet-balance">
                    <span id="wallet-balance">0</span> ⭐
                </div>
            </div>
            
            <div class="stats-panel">
                <div>👥 Игроков: <span id="players-count">0</span>/<span id="max-players">0</span></div>
                <div>🏆 Приз: <span id="prize-pool">0</span> ⭐</div>
            </div>
            
            <div class="timer" id="timer">⏱️ 00:00</div>
            <div class="game-status waiting" id="game-status">⏳ Ожидание игроков...</div>
            
            <div class="tap-area" id="tap-area">👆</div>
            
            <div class="score">🎯 Счёт: <span id="score">0</span></div>
            
            <button class="buy-btn" id="buy-ticket-btn" style="display: none;">🎫 Купить билет</button>
            <button class="buy-ton-btn" id="buy-ton-btn" style="display: none;">💎 Купить за TON</button>
            
            <div class="leaderboard">
                <h3>🏆 Топ игроков</h3>
                <div id="leaderboard-list">Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
        // ========== ИНИЦИАЛИЗАЦИЯ TELEGRAM ==========
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // ========== TON CONNECT ==========
        let tonConnectUI = null;
        let tonWalletAddress = null;
        
        function initTonConnect() {
            try {
                tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                    buttonRootId: 'ton-connect-btn'
                });
                console.log('TON Connect initialized');
            } catch(e) {
                console.error('TON Connect init error:', e);
            }
        }
        
        async function connectTonWallet() {
            if (!tonConnectUI) {
                initTonConnect();
            }
            try {
                await tonConnectUI.openModal();
            } catch(e) {
                console.error('Connect error:', e);
                tg.showAlert('❌ Ошибка подключения кошелька');
            }
        }
        
        // ========== ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ==========
        const userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 10000);
        const username = tg.initDataUnsafe?.user?.username || 'Player';
        const fullName = tg.initDataUnsafe?.user?.first_name || username;
        
        console.log('👤 Пользователь:', fullName, 'ID:', userId);
        
        // ========== ИГРОВЫЕ ПЕРЕМЕННЫЕ ==========
        let selectedGameType = null;
        let selectedGameConfig = null;
        let currentGameId = null;
        let score = 0;
        let gameActive = false;
        let hasTicket = false;
        let timeLeft = 60;
        let timerInterval = null;
        let gameStarted = false;
        let playersInterval = null;
        
        // ========== DOM ЭЛЕМЕНТЫ ==========
        const selectorScreen = document.getElementById('selector-screen');
        const gameScreen = document.getElementById('game-screen');
        const gamesList = document.getElementById('games-list');
        const backBtn = document.getElementById('back-btn');
        const tapArea = document.getElementById('tap-area');
        const scoreSpan = document.getElementById('score');
        const timerSpan = document.getElementById('timer');
        const gameStatusSpan = document.getElementById('game-status');
        const playersCountSpan = document.getElementById('players-count');
        const maxPlayersSpan = document.getElementById('max-players');
        const prizePoolSpan = document.getElementById('prize-pool');
        const buyTicketBtn = document.getElementById('buy-ticket-btn');
        const buyTonBtn = document.getElementById('buy-ton-btn');
        const leaderboardDiv = document.getElementById('leaderboard-list');
        const tonConnectBtn = document.getElementById('ton-connect-btn');
        
        // ========== КОНФИГУРАЦИЯ ИГР ==========
        const GAME_TYPES = {
            mini: { name: "Мини", emoji: "🟢", ticket_price: 10, max_players: 10, prize_pool: 60, duration: 30 },
            standard: { name: "Стандарт", emoji: "🔵", ticket_price: 50, max_players: 20, prize_pool: 750, duration: 60 },
            vip: { name: "VIP", emoji: "🟣", ticket_price: 100, max_players: 10, prize_pool: 750, duration: 60 },
            duel: { name: "Дуэль", emoji: "⚔️", ticket_price: 10, max_players: 2, prize_pool: 15, duration: 30 }
        };
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function getTonPrice(stars) {
            return (stars / 700).toFixed(5);
        }
        
        // ========== API ЗАПРОСЫ ==========
        async function refreshGameState() {
            try {
                const response = await fetch('/api/game/current');
                const data = await response.json();
                if (data.game_id) {
                    currentGameId = data.game_id;
                    playersCountSpan.textContent = data.players_count || 0;
                    maxPlayersSpan.textContent = data.max_players || selectedGameConfig?.max_players || 0;
                    console.log('🔄 Game state:', data.players_count, '/', data.max_players, 'players');
                    return data;
                }
            } catch(e) {
                console.error('Refresh error:', e);
            }
            return null;
        }
        
        async function loadLeaderboard() {
            try {
                const response = await fetch('/api/leaderboard');
                const data = await response.json();
                if (data.leaders && data.leaders.length > 0) {
                    leaderboardDiv.innerHTML = '';
                    data.leaders.slice(0, 10).forEach((player, idx) => {
                        const item = document.createElement('div');
                        item.className = 'leaderboard-item';
                        let medal = idx === 0 ? '🥇 ' : idx === 1 ? '🥈 ' : idx === 2 ? '🥉 ' : '';
                        item.innerHTML = `<span>${medal}${idx+1}. ${player.full_name || player.username}</span><span>${player.score || 0} 👆</span>`;
                        leaderboardDiv.appendChild(item);
                    });
                } else {
                    leaderboardDiv.innerHTML = 'Нет данных';
                }
            } catch(e) {
                console.error('Leaderboard error:', e);
                leaderboardDiv.innerHTML = 'Ошибка загрузки';
            }
        }
        
        async function loadBalance() {
            try {
                const response = await fetch(`/api/balance/${userId}`);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('wallet-balance').textContent = data.balance;
                }
            } catch(e) {
                console.error('Balance error:', e);
            }
        }
        
        // ========== ПРИСОЕДИНЕНИЕ К ИГРЕ ==========
        async function forceJoinGame() {
            try {
                const response = await fetch(`/api/game/${currentGameId}/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await response.json();
                console.log('Force join result:', data);
                
                if (data.success) {
                    console.log('✅ Successfully joined game');
                    await refreshGameState();
                    
                    const game = await refreshGameState();
                    if (game && game.players_count >= game.max_players && !gameStarted) {
                        startGame();
                    }
                } else {
                    console.error('Failed to join game:', data.error);
                }
            } catch(e) {
                console.error('Force join error:', e);
            }
        }
        
        // ========== ИГРОВАЯ ЛОГИКА ==========
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                
                if (timeLeft > 0) {
                    timeLeft--;
                    timerSpan.textContent = `⏱️ ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
                }
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }
        
        async function endGame() {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            tapArea.style.pointerEvents = 'none';
            tapArea.style.opacity = '0.5';
            gameStatusSpan.className = 'game-status ended';
            gameStatusSpan.innerHTML = '🏁 Игра окончена! 🏁';
            
            await fetch('/api/update-score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, username: username, full_name: fullName, score: score })
            }).catch(e => console.error);
            
            tg.showAlert(`Игра окончена!\nВаш результат: ${score} тапов!`);
            await loadBalance();
            await loadLeaderboard();
        }
        
        function startGame() {
            gameStarted = true;
            gameActive = true;
            gameStatusSpan.className = 'game-status playing';
            gameStatusSpan.innerHTML = '🎮 ИГРА ИДЁТ! ТАПАЙ! 🎮';
            startTimer();
        }
        
        async function startWaiting() {
            await refreshGameState();
            
            playersInterval = setInterval(async () => {
                if (gameStarted) return;
                
                try {
                    const response = await fetch('/api/game/current');
                    const game = await response.json();
                    
                    if (game.game_id) {
                        currentGameId = game.game_id;
                        playersCountSpan.textContent = game.players_count || 0;
                        
                        if (game.players_count >= selectedGameConfig.max_players && !gameStarted) {
                            clearInterval(playersInterval);
                            startGame();
                        }
                    }
                } catch(e) {
                    console.error('Error checking game state:', e);
                }
            }, 2000);
        }
        
        // ========== ПОКУПКА БИЛЕТА ==========
        async function buyTicketWithTon() {
            if (!tonWalletAddress) {
                tg.showAlert('⚠️ Сначала подключите TON кошелёк');
                await connectTonWallet();
                return;
            }
            
            const priceInTon = getTonPrice(selectedGameConfig.ticket_price);
            
            tg.showPopup({
                title: 'Подтверждение оплаты',
                message: `Купить билет на игру "${selectedGameConfig.name}" за ${priceInTon} TON?`,
                buttons: [
                    {id: 'confirm', type: 'default', text: '✅ Оплатить'},
                    {id: 'cancel', type: 'cancel', text: 'Отмена'}
                ]
            }, async (buttonId) => {
                if (buttonId === 'confirm') {
                    buyTonBtn.disabled = true;
                    buyTonBtn.textContent = '⏳ Оплата...';
                    
                    try {
                        const transaction = {
                            validUntil: Math.floor(Date.now() / 1000) + 600,
                            messages: [
                                {
                                    address: "EQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAG9dA",
                                    amount: (parseFloat(priceInTon) * 1000000000).toString(),
                                }
                            ]
                        };
                        
                        const result = await tonConnectUI.sendTransaction(transaction);
                        console.log('Transaction sent:', result);
                        
                        const response = await fetch('/api/payment/ton/confirm', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                user_id: userId,
                                game_id: currentGameId,
                                game_type: selectedGameType,
                                tx_hash: result.boc || 'test_hash_' + Date.now()
                            })
                        });
                        
                        const data = await response.json();
                        console.log('Server response:', data);
                        
                        if (data.success) {
                            tg.showAlert('✅ Билет куплен! Присоединяем к игре...');
                            hasTicket = true;
                            buyTicketBtn.style.display = 'none';
                            buyTonBtn.style.display = 'none';
                            
                            if (data.game_id) {
                                currentGameId = data.game_id;
                            }
                            if (data.players_count) {
                                playersCountSpan.textContent = data.players_count;
                            }
                            
                            await forceJoinGame();
                            
                        } else {
                            tg.showAlert('❌ Ошибка: ' + (data.error || 'Попробуйте ещё раз'));
                            buyTonBtn.disabled = false;
                            buyTonBtn.textContent = `💎 Купить за ${priceInTon} TON`;
                        }
                        
                    } catch(e) {
                        console.error('TON payment error:', e);
                        tg.showAlert('❌ Ошибка при оплате: ' + e.message);
                        buyTonBtn.disabled = false;
                        buyTonBtn.textContent = `💎 Купить за ${priceInTon} TON`;
                    }
                }
            });
        }
        
        // ========== ВЫБОР ИГРЫ ==========
        function displayGames() {
            gamesList.innerHTML = '';
            const order = ['mini', 'standard', 'vip', 'duel'];
            
            for (const key of order) {
                const config = GAME_TYPES[key];
                const card = document.createElement('div');
                card.className = `game-card ${key}`;
                card.innerHTML = `
                    <div class="game-header">
                        <span class="game-title">${config.emoji} ${config.name}</span>
                        <span class="game-price">${config.ticket_price} ⭐</span>
                    </div>
                    <div class="game-stats">
                        <div>👥 ${config.max_players} игроков</div>
                        <div>⏱️ ${config.duration} сек</div>
                        <div>🏆 ${config.prize_pool} ⭐</div>
                    </div>
                    <button class="join-btn">Выбрать</button>
                `;
                
                const btn = card.querySelector('.join-btn');
                btn.onclick = () => selectGame(key, config);
                gamesList.appendChild(card);
            }
        }
        
        async function selectGame(type, config) {
            selectedGameType = type;
            selectedGameConfig = config;
            currentGameId = Date.now();
            
            selectorScreen.classList.add('hide');
            gameScreen.classList.add('active');
            
            maxPlayersSpan.textContent = config.max_players;
            prizePoolSpan.textContent = config.prize_pool;
            timeLeft = config.duration;
            timerSpan.textContent = `⏱️ ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
            
            score = 0;
            scoreSpan.textContent = '0';
            gameActive = false;
            gameStarted = false;
            hasTicket = false;
            gameStatusSpan.className = 'game-status waiting';
            gameStatusSpan.innerHTML = '⏳ Ожидание игроков...';
            tapArea.style.opacity = '1';
            tapArea.style.pointerEvents = 'auto';
            
            buyTicketBtn.style.display = 'block';
            buyTicketBtn.disabled = true;
            buyTicketBtn.textContent = '🎫 Купить билет (временно недоступно)';
            buyTonBtn.style.display = 'block';
            buyTonBtn.textContent = `💎 Купить за ${getTonPrice(config.ticket_price)} TON`;
            buyTonBtn.disabled = false;
            
            if (playersInterval) clearInterval(playersInterval);
            if (timerInterval) clearInterval(timerInterval);
            
            await startWaiting();
        }
        
        // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
        tapArea.addEventListener('click', () => {
            if (!gameActive) return;
            
            score++;
            scoreSpan.textContent = score;
            
            tapArea.style.transform = 'scale(0.95)';
            setTimeout(() => {
                tapArea.style.transform = 'scale(1)';
            }, 100);
        });
        
        backBtn.onclick = () => {
            if (timerInterval) clearInterval(timerInterval);
            if (playersInterval) clearInterval(playersInterval);
            gameActive = false;
            gameStarted = false;
            score = 0;
            selectorScreen.classList.remove('hide');
            gameScreen.classList.remove('active');
            loadLeaderboard();
        };
        
        tonConnectBtn.onclick = connectTonWallet;
        buyTonBtn.onclick = buyTicketWithTon;
        
        // ========== ЗАПУСК ==========
        initTonConnect();
        displayGames();
        loadLeaderboard();
        loadBalance();
        setInterval(loadLeaderboard, 5000);
        setInterval(loadBalance, 10000);
        
        console.log('🚀 Tap Wars загружен!');
    </script>
</body>
</html>
