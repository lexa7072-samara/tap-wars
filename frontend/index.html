<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tap Wars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 32px;
        }
        .game-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .game-card:active {
            transform: scale(0.98);
        }
        .game-card.mini { border-left: 5px solid #00b894; }
        .game-card.standard { border-left: 5px solid #0984e3; }
        .game-card.vip { border-left: 5px solid #6c5ce7; }
        .game-card.duel { border-left: 5px solid #e17055; }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .game-title {
            font-size: 24px;
            font-weight: bold;
        }
        .game-price {
            background: #fdcb6e;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .game-stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            color: #666;
        }
        .join-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .selector-screen {
            display: block;
        }
        .selector-screen.hide {
            display: none;
        }
        .game-screen {
            display: none;
        }
        .game-screen.active {
            display: block;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .tap-area {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .tap-area:active {
            transform: scale(0.95);
        }
        .score {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: white;
        }
        .score span {
            font-size: 48px;
            color: #fdcb6e;
        }
        .timer {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            color: #fdcb6e;
        }
        .game-status {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-weight: bold;
        }
        .game-status.waiting {
            background: #ffeaa7;
            color: #d63031;
        }
        .game-status.playing {
            background: #55efc4;
            color: #006266;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.9);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .leaderboard {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }
        .leaderboard h3 {
            text-align: center;
            margin-bottom: 10px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        .buy-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Экран выбора игры -->
        <div id="selector-screen" class="selector-screen">
            <h1>⚡ TAP WARS ⚡</h1>
            <div id="games-list"></div>
        </div>
        
        <!-- Экран игры -->
        <div id="game-screen" class="game-screen">
            <button class="back-btn" id="back-btn">← Назад к выбору</button>
            
            <div class="stats-panel">
                <div>👥 Игроков: <span id="players-count">0</span>/<span id="max-players">0</span></div>
                <div>🏆 Приз: <span id="prize-pool">0</span> ⭐</div>
            </div>
            
            <div class="timer" id="timer">⏱️ 00:00</div>
            <div class="game-status waiting" id="game-status">⏳ Ожидание игроков...</div>
            
            <div class="tap-area" id="tap-area">👆</div>
            
            <div class="score">🎯 Счёт: <span id="score">0</span></div>
            
            <button class="buy-btn" id="buy-ticket-btn">🎫 Купить билет</button>
            
            <div class="leaderboard">
                <h3>🏆 Топ игроков</h3>
                <div id="leaderboard-list">Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Данные пользователя
        const userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 10000);
        const username = tg.initDataUnsafe?.user?.username || 'Player';
        const fullName = tg.initDataUnsafe?.user?.first_name || username;
        
        console.log('👤 Пользователь:', fullName, 'ID:', userId);
        
        // Игровые переменные
        let selectedGameType = null;
        let selectedGameConfig = null;
        let currentGameId = null;
        let score = 0;
        let gameActive = false;
        let timeLeft = 60;
        let timerInterval = null;
        
        // DOM элементы
        const selectorScreen = document.getElementById('selector-screen');
        const gameScreen = document.getElementById('game-screen');
        const gamesList = document.getElementById('games-list');
        const backBtn = document.getElementById('back-btn');
        const tapArea = document.getElementById('tap-area');
        const scoreSpan = document.getElementById('score');
        const timerSpan = document.getElementById('timer');
        const gameStatusSpan = document.getElementById('game-status');
        const playersCountSpan = document.getElementById('players-count');
        const maxPlayersSpan = document.getElementById('max-players');
        const prizePoolSpan = document.getElementById('prize-pool');
        const buyTicketBtn = document.getElementById('buy-ticket-btn');
        const leaderboardDiv = document.getElementById('leaderboard-list');
        
        // Конфигурация игр
        const GAME_TYPES = {
            mini: { name: "Мини", emoji: "🟢", ticket_price: 10, max_players: 10, prize_pool: 60, duration: 30 },
            standard: { name: "Стандарт", emoji: "🔵", ticket_price: 50, max_players: 20, prize_pool: 750, duration: 60 },
            vip: { name: "VIP", emoji: "🟣", ticket_price: 100, max_players: 10, prize_pool: 750, duration: 60 },
            duel: { name: "Дуэль", emoji: "⚔️", ticket_price: 10, max_players: 2, prize_pool: 15, duration: 30 }
        };
        
        // Отображение карточек игр
        function displayGames() {
            gamesList.innerHTML = '';
            const order = ['mini', 'standard', 'vip', 'duel'];
            
            for (const key of order) {
                const config = GAME_TYPES[key];
                const card = document.createElement('div');
                card.className = `game-card ${key}`;
                card.innerHTML = `
                    <div class="game-header">
                        <span class="game-title">${config.emoji} ${config.name}</span>
                        <span class="game-price">${config.ticket_price} ⭐</span>
                    </div>
                    <div class="game-stats">
                        <div>👥 ${config.max_players} игроков</div>
                        <div>⏱️ ${config.duration} сек</div>
                        <div>🏆 ${config.prize_pool} ⭐</div>
                    </div>
                    <button class="join-btn">Выбрать</button>
                `;
                
                const btn = card.querySelector('.join-btn');
                btn.onclick = () => selectGame(key, config);
                gamesList.appendChild(card);
            }
        }
        
        // Выбор игры
        function selectGame(type, config) {
            selectedGameType = type;
            selectedGameConfig = config;
            currentGameId = Date.now();
            
            // Прячем выбор, показываем игру
            selectorScreen.classList.add('hide');
            gameScreen.classList.add('active');
            
            // Настройка игры
            maxPlayersSpan.textContent = config.max_players;
            prizePoolSpan.textContent = config.prize_pool;
            timeLeft = config.duration;
            timerSpan.textContent = `⏱️ ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
            
            // Сброс состояния
            score = 0;
            scoreSpan.textContent = '0';
            gameActive = false;
            gameStatusSpan.className = 'game-status waiting';
            gameStatusSpan.innerHTML = '⏳ Ожидание игроков...';
            tapArea.style.opacity = '1';
            tapArea.style.pointerEvents = 'auto';
            
            // Показываем кнопку покупки
            buyTicketBtn.style.display = 'block';
            buyTicketBtn.textContent = `🎫 Купить билет (${config.ticket_price} ⭐)`;
            buyTicketBtn.disabled = false;
            
            // Запускаем ожидание
            startWaiting();
        }
        
        // Ожидание начала игры
        function startWaiting() {
            // Симуляция набора игроков (для теста)
            let players = 1;
            playersCountSpan.textContent = players;
            
            const interval = setInterval(() => {
                if (players < selectedGameConfig.max_players) {
                    players++;
                    playersCountSpan.textContent = players;
                    
                    if (players >= selectedGameConfig.max_players) {
                        clearInterval(interval);
                        startGame();
                    }
                }
            }, 2000);
        }
        
        // Начало игры
        function startGame() {
            gameActive = true;
            gameStatusSpan.className = 'game-status playing';
            gameStatusSpan.innerHTML = '🎮 ИГРА ИДЁТ! ТАПАЙ! 🎮';
            startTimer();
        }
        
        // Таймер
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                
                if (timeLeft > 0) {
                    timeLeft--;
                    timerSpan.textContent = `⏱️ ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
                }
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }
        
        // Завершение игры
        function endGame() {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            tapArea.style.pointerEvents = 'none';
            tapArea.style.opacity = '0.5';
            gameStatusSpan.className = 'game-status ended';
            gameStatusSpan.innerHTML = '🏁 Игра окончена! 🏁';
            
            tg.showAlert(`Игра окончена!\nВаш результат: ${score} тапов!`);
        }
        
        // Обработка тапа
        tapArea.addEventListener('click', () => {
            if (!gameActive) return;
            
            score++;
            scoreSpan.textContent = score;
            
            // Визуальный эффект
            tapArea.style.transform = 'scale(0.95)';
            setTimeout(() => {
                tapArea.style.transform = 'scale(1)';
            }, 100);
        });
        
        // Покупка билета
        buyTicketBtn.onclick = () => {
            tg.showAlert(`✅ Билет на игру "${selectedGameConfig.name}" куплен!\nПрисоединяемся к игре...`);
            buyTicketBtn.style.display = 'none';
        };
        
        // Кнопка назад
        backBtn.onclick = () => {
            if (timerInterval) clearInterval(timerInterval);
            gameActive = false;
            score = 0;
            selectorScreen.classList.remove('hide');
            gameScreen.classList.remove('active');
        };
        
        // Загрузка лидерборда
        async function loadLeaderboard() {
            try {
                const response = await fetch('/api/leaderboard');
                const data = await response.json();
                if (data.leaders && data.leaders.length > 0) {
                    leaderboardDiv.innerHTML = '';
                    data.leaders.slice(0, 10).forEach((player, idx) => {
                        const item = document.createElement('div');
                        item.className = 'leaderboard-item';
                        let medal = idx === 0 ? '🥇 ' : idx === 1 ? '🥈 ' : idx === 2 ? '🥉 ' : '';
                        item.innerHTML = `<span>${medal}${idx+1}. ${player.full_name || player.username}</span><span>${player.score || 0} 👆</span>`;
                        leaderboardDiv.appendChild(item);
                    });
                } else {
                    leaderboardDiv.innerHTML = 'Нет данных';
                }
            } catch(e) {
                console.error('Leaderboard error:', e);
                leaderboardDiv.innerHTML = 'Ошибка загрузки';
            }
        }
        
        // Загрузка баланса
        async function loadBalance() {
            try {
                const response = await fetch(`/api/balance/${userId}`);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('wallet-balance').textContent = data.balance;
                }
            } catch(e) {
                console.error('Balance error:', e);
            }
        }
        
        // Инициализация
        displayGames();
        loadLeaderboard();
        loadBalance();
        setInterval(loadLeaderboard, 5000);
        
        console.log('🚀 Tap Wars загружен!');
    </script>
</body>
</html>
