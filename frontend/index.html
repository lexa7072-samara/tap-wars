<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tap Wars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- TON Connect UI -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(20deg); opacity: 0; }
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .selector-screen {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        .selector-screen.hide {
            display: none;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 32px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            animation: bounce 2s ease infinite;
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            cursor: pointer;
        }
        
        .game-card:active {
            transform: scale(0.98);
        }
        
        .game-card.mini { border-left: 5px solid #00b894; }
        .game-card.standard { border-left: 5px solid #0984e3; }
        .game-card.vip { border-left: 5px solid #6c5ce7; }
        .game-card.duel { border-left: 5px solid #e17055; }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .game-title { font-size: 24px; font-weight: bold; }
        .game-price {
            font-size: 20px;
            font-weight: bold;
            background: #fdcb6e;
            padding: 5px 12px;
            border-radius: 20px;
            color: #2d3436;
        }
        
        .game-stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        
        .stat-item { text-align: center; }
        .stat-value { font-size: 20px; font-weight: bold; color: #2d3436; }
        .stat-label { font-size: 12px; color: #666; }
        .prize { color: #00b894; }
        .game-description { color: #666; font-size: 14px; margin-top: 10px; text-align: center; }
        
        .join-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
        }
        
        .join-btn:active { transform: scale(0.98); }
        
        .game-screen { display: none; }
        .game-screen.active { display: block; animation: slideIn 0.3s ease; }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .player-info {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 14px;
        }
        
        .wallet-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            color: white;
        }
        
        .wallet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .wallet-balance { font-size: 28px; font-weight: bold; }
        .wallet-balance small { font-size: 14px; opacity: 0.8; }
        
        .ton-connect-container {
            display: flex;
            gap: 10px;
        }
        
        .withdraw-btn, .ton-wallet-btn {
            background: #ffd700;
            color: #2d3436;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: auto;
            margin-top: 0;
        }
        
        .ton-wallet-btn {
            background: #0098ea;
            color: white;
        }
        
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.9);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .stat { text-align: center; }
        .stat-label { font-size: 12px; color: #666; }
        .stat-value { font-size: 18px; font-weight: bold; color: #2d3436; }
        
        .timer {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            color: #fdcb6e;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .game-status {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .game-status.waiting { background: #ffeaa7; color: #d63031; }
        .game-status.playing { background: #55efc4; color: #006266; animation: pulse 1s infinite; }
        .game-status.ended { background: #dfe6e9; color: #2d3436; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        .tap-area {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            cursor: pointer;
            transition: transform 0.05s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .tap-area:active { transform: scale(0.95); }
        
        .score {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: white;
        }
        
        .score span { font-size: 48px; color: #fdcb6e; }
        
        .floating-score {
            position: fixed;
            font-size: 28px;
            font-weight: bold;
            color: #fdcb6e;
            text-shadow: 0 0 5px #ff6b6b;
            pointer-events: none;
            z-index: 1000;
            animation: float 1s ease-out forwards;
        }
        
        .leaderboard {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .leaderboard h3 { margin-bottom: 10px; text-align: center; color: #2d3436; }
        .leaderboard-list { max-height: 250px; overflow-y: auto; }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        
        .leaderboard-item.top-1 { background: linear-gradient(90deg, #ffd70020, transparent); }
        .leaderboard-item.top-2 { background: linear-gradient(90deg, #c0c0c020, transparent); }
        .leaderboard-item.top-3 { background: linear-gradient(90deg, #cd7f3220, transparent); }
        
        button {
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
        }
        
        button:active { transform: scale(0.98); }
        
        .buy-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .buy-ton-btn { background: linear-gradient(135deg, #0098ea 0%, #0066cc 100%); }
        .buy-btn.disabled, .buy-ton-btn.disabled { opacity: 0.5; cursor: not-allowed; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 350px;
            width: 90%;
            max-height: 80%;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .modal-title { font-size: 20px; font-weight: bold; color: #2d3436; }
        .modal-close { font-size: 24px; cursor: pointer; color: #999; }
        
        .input-field {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 16px;
            margin-top: 5px;
        }
        
        .withdraw-history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        
        .withdraw-status-pending { color: #fdcb6e; }
        .withdraw-status-completed { color: #00b894; }
        .withdraw-status-cancelled { color: #ff6b6b; }
        
        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        
        .price-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .price-row button {
            flex: 1;
        }
    </style>
</head>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // TON Connect инициализация
        let tonConnectUI = null;
        let tonWalletAddress = null;
        
        // Инициализация TON Connect
        function initTonConnect() {
            const tonConnectDiv = document.createElement('div');
            tonConnectDiv.id = 'ton-connect-container';
            tonConnectDiv.style.display = 'none';
            document.body.appendChild(tonConnectDiv);
            
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://tap-wars.onrender.com/tonconnect-manifest.json',
                buttonRootId: 'ton-connect-container'
            });
            
            // Настройка возврата в Mini App после подключения кошелька [citation:2][citation:6]
            tonConnectUI.uiOptions = {
                twaReturnUrl: 'https://t.me/YOUR_BOT_USERNAME/play'
            };
            
            // Слушаем изменения статуса кошелька
            tonConnectUI.onStatusChange((wallet) => {
                if (wallet) {
                    tonWalletAddress = wallet.account.address;
                    console.log('TON Wallet connected:', tonWalletAddress);
                    document.getElementById('ton-connect-btn').textContent = '🔗 Кошелёк подключён';
                    document.getElementById('ton-connect-btn').style.background = '#00b894';
                } else {
                    tonWalletAddress = null;
                    document.getElementById('ton-connect-btn').textContent = '🔗 TON Wallet';
                    document.getElementById('ton-connect-btn').style.background = '#0098ea';
                }
            });
        }
        
        // Подключение TON кошелька
        async function connectTonWallet() {
            if (!tonConnectUI) {
                initTonConnect();
            }
            try {
                await tonConnectUI.openModal();
            } catch(e) {
                console.error('TON Connect error:', e);
            }
        }
        
        // Покупка билета за TON
        async function buyTicketWithTon() {

            }, async (buttonId) => {

                    try {
                        // Создаём транзакцию [citation:2][citation:6]

                                    address: "UQDtz12Jd0KUWpfN6DSy1bE7NOP4Bd9ha8SVAhyJw1umgFnO", // Замените на ваш TON адрес
                                    amount: (priceInTon * 1000000000).toString(), // в нанотонах
                                }
                            ]
                        };
                        
                        const result = await tonConnectUI.sendTransaction(transaction);
                        console.log('Transaction sent:', result);
                        
                        // Отправляем подтверждение на бэкенд
                        const response = await fetch('/api/payment/ton/confirm', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },

                                game_id: currentGameId,
                                game_type: selectedGameType,
                                tx_hash: result
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
    tg.showAlert('✅ Билет куплен! Присоединяем к игре...');

    buyTicketBtn.style.display = 'none';

    // Обновляем game_id и количество игроков

    }
    if (data.players_count) {
        playersCountSpan.textContent = data.players_count;
    }
    
    // Принудительно присоединяемся к игре
    await forceJoinGame();
    
} else {
    tg.showAlert('❌ Ошибка: ' + (data.error || 'Попробуйте ещё раз'));
    buyTonBtn.disabled = false;
    buyTonBtn.textContent = `💎 Купить за ${priceInTon} TON`;
}
        
        // Звуковые эффекты (как в предыдущей версии)
        let soundEnabled = true;
        let audioCtx = null;
        let currentBalance = 0;
        
        function initAudio() {
            if (!audioCtx && soundEnabled) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playTapSound() {
            if (!soundEnabled) return;
            try {
                initAudio();
                if (audioCtx) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 800;
                    gain.gain.value = 0.1;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                    osc.stop(audioCtx.currentTime + 0.3);
                }
            } catch(e) {}
        }
        
        function playGameStartSound() {
            if (!soundEnabled) return;
            try {
                initAudio();
                if (audioCtx) {
                    const freqs = [523.25, 587.33, 659.25, 783.99];
                    freqs.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        gain.gain.value = 0.1;
                        osc.start(audioCtx.currentTime + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + i * 0.1 + 0.3);
                        osc.stop(audioCtx.currentTime + i * 0.1 + 0.3);
                    });
                }
            } catch(e) {}
        }
        
        function playGameEndSound() {
            if (!soundEnabled) return;
            try {
                initAudio();
                if (audioCtx) {
                    const freqs = [783.99, 659.25, 523.25];
                    freqs.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        gain.gain.value = 0.1;
                        osc.start(audioCtx.currentTime + i * 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + i * 0.15 + 0.5);
                        osc.stop(audioCtx.currentTime + i * 0.15 + 0.5);
                    });
                }
            } catch(e) {}
        }

            const el = document.createElement('div');
            el.className = 'floating-score';
            el.textContent = '+1';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        
        const userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 10000);
        const username = tg.initDataUnsafe?.user?.username || 'Player';
        const firstName = tg.initDataUnsafe?.user?.first_name || '';
        const lastName = tg.initDataUnsafe?.user?.last_name || '';
        const fullName = (firstName + ' ' + lastName).trim() || username;
        
        let selectedGameType = null;
        let selectedGameConfig = null;
        let currentGameId = null;
        let score = 0;
        let gameActive = false;
        let hasTicket = false;
        let timeLeft = 60;
        let timerInterval = null;
        let gameStarted = false;
        
        const selectorScreen = document.getElementById('selector-screen');
        const gameScreen = document.getElementById('game-screen');
        const gamesList = document.getElementById('games-list');
        const backBtn = document.getElementById('back-btn');
        const tapArea = document.getElementById('tap-area');
        const scoreSpan = document.getElementById('score');
        const timerSpan = document.getElementById('timer');
        const gameStatusSpan = document.getElementById('game-status');
        const playersCountSpan = document.getElementById('players-count');
        const maxPlayersSpan = document.getElementById('max-players');
        const prizePoolSpan = document.getElementById('prize-pool');
        const buyTicketBtn = document.getElementById('buy-ticket-btn');
        const buyTonBtn = document.getElementById('buy-ton-btn');
        const leaderboardDiv = document.getElementById('leaderboard-list');
        const playerInfoSpan = document.getElementById('player-info');
        const soundToggle = document.getElementById('sound-toggle');
        const tonConnectBtn = document.getElementById('ton-connect-btn');
        
        playerInfoSpan.innerHTML = `👤 ${fullName} (@${username})`;
        
        soundToggle.onclick = () => {
            soundEnabled = !soundEnabled;
            soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
        };
        
        tonConnectBtn.onclick = connectTonWallet;
        
        async function loadBalance() {
            try {
                const response = await fetch(`/api/balance/${userId}`);
                const data = await response.json();
                if (data.success) {
                    currentBalance = data.balance;
                    document.getElementById('wallet-balance').textContent = currentBalance;
                }
            } catch(e) { console.error(e); }
        }
        
        async function loadGameTypes() {
            try {
                const response = await fetch('/api/game/types');
                const data = await response.json();
                displayGames(data.types);
            } catch(e) {
                displayGames({
                    mini: { name: "Мини", emoji: "🟢", ticket_price: 10, max_players: 10, prize_pool: 60, duration: 30, description: "Быстрая игра" },
                    standard: { name: "Стандарт", emoji: "🔵", ticket_price: 50, max_players: 20, prize_pool: 750, duration: 60, description: "Классическая битва" },
                    vip: { name: "VIP", emoji: "🟣", ticket_price: 100, max_players: 10, prize_pool: 750, duration: 60, description: "Элитная игра" },
                    duel: { name: "Дуэль", emoji: "⚔️", ticket_price: 10, max_players: 2, prize_pool: 15, duration: 30, description: "Битва 1 на 1" }
                });
            }
        }
        
        function displayGames(types) {
            gamesList.innerHTML = '';
            const order = ['mini', 'standard', 'vip', 'duel'];
            for (const key of order) {
                if (!types[key]) continue;
                const config = types[key];
                const card = document.createElement('div');
                card.className = `game-card ${key}`;
                
                let prizeText = '';
                if (key === 'duel') {
                    prizeText = '🏆 Победитель: 15 ⭐';
                } else if (key === 'mini') {
                    prizeText = '🏆 Топ-3: 35/15/10 ⭐';
                } else {
                    prizeText = `🏆 Призовой фонд: ${config.prize_pool} ⭐`;
                }
                
                card.innerHTML = `
                    <div class="game-header">
                        <span class="game-title">${config.emoji} ${config.name}</span>
                        <span class="game-price">${config.ticket_price} ⭐</span>
                    </div>
                    <div class="game-stats">
                        <div class="stat-item"><div class="stat-value">${config.max_players}</div><div class="stat-label">игроков</div></div>
                        <div class="stat-item"><div class="stat-value prize">${config.prize_pool} ⭐</div><div class="stat-label">приз</div></div>
                        <div class="stat-item"><div class="stat-value">${config.duration} сек</div><div class="stat-label">длительность</div></div>
                    </div>
                    <div class="game-description">${config.description}</div>
                    <div style="font-size: 12px; color: #00b894; text-align: center; margin-top: 5px;">${prizeText}</div>
                    <button class="join-btn" data-type="${key}">Выбрать</button>
                `;
                
                card.querySelector('.join-btn').onclick = () => selectGame(key, config);
                gamesList.appendChild(card);
            }
        }
        
        async function selectGame(type, config) {
            selectedGameType = type;
            selectedGameConfig = config;
            
            try {
                const response = await fetch('/api/game/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ game_type: type })
                });
                const data = await response.json();
                currentGameId = data.game_id;
            } catch(e) { currentGameId = Date.now(); }
            
            await checkTicket();
            
            selectorScreen.classList.add('hide');
            gameScreen.classList.add('active');
            
            maxPlayersSpan.textContent = config.max_players;
            prizePoolSpan.textContent = config.prize_pool;
            timeLeft = config.duration;
            timerSpan.textContent = `⏱️ ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
            
            await getCurrentGame();
            updateGameInfoInterval = setInterval(updateGameInfo, 2000);
        }
        
        async function checkTicket() {
            hasTicket = false;
            if (!hasTicket) {
                buyTicketBtn.style.display = 'block';
                buyTonBtn.style.display = 'block';
                buyTicketBtn.textContent = `🎫 Купить за ${selectedGameConfig.ticket_price} ⭐`;
                buyTonBtn.textContent = `💎 Купить за ${(selectedGameConfig.ticket_price / 1000).toFixed(3)} TON`;
                tapArea.style.opacity = '0.5';
                tapArea.style.pointerEvents = 'none';
            } else {
                buyTicketBtn.style.display = 'none';
                buyTonBtn.style.display = 'none';
                tapArea.style.opacity = '1';
                tapArea.style.pointerEvents = 'auto';
                await joinGame();
            }
        }
        
        buyTicketBtn.onclick = async () => {
            buyTicketBtn.disabled = true;
            buyTicketBtn.textContent = '⏳ Обработка...';
            
            try {
                const response = await fetch('/api/payment/create-invoice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_id: userId, 
                        game_id: currentGameId,
                        game_type: selectedGameType,
                        amount: selectedGameConfig.ticket_price 
                    })
                });
                const data = await response.json();
                
                if (data.success && data.invoice_link) {
                    tg.openInvoice(data.invoice_link, async (status) => {
                        if (status === 'paid') {
                            tg.showAlert('✅ Билет куплен! Присоединяем к игре...');
                            await new Promise(resolve => setTimeout(resolve, 2000));
                            await checkTicket();
                            if (hasTicket) {
                                buyTicketBtn.style.display = 'none';
                                buyTonBtn.style.display = 'none';
                                tapArea.style.opacity = '1';
                                tapArea.style.pointerEvents = 'auto';
                                await joinGame();
                            } else {
                                await joinGameDirectly();
                            }
                        } else {
                            buyTicketBtn.disabled = false;
                            buyTicketBtn.textContent = `🎫 Купить билет (${selectedGameConfig.ticket_price} ⭐)`;
                        }
                    });
                } else {
                    buyTicketBtn.disabled = false;
                    buyTicketBtn.textContent = `🎫 Купить билет (${selectedGameConfig.ticket_price} ⭐)`;
                    tg.showAlert('❌ Ошибка: ' + (data.error || 'Не удалось создать инвойс'));
                }
            } catch(e) {
                console.error('Buy ticket error:', e);
                buyTicketBtn.disabled = false;
                buyTicketBtn.textContent = `🎫 Купить билет (${selectedGameConfig.ticket_price} ⭐)`;
                tg.showAlert('❌ Ошибка соединения');
            }
        };
        
        buyTonBtn.onclick = buyTicketWithTon;
        
        async function joinGameDirectly() {
            try {
                const response = await fetch(`/api/game/${currentGameId}/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await response.json();
                if (data.success) {
                    hasTicket = true;
                    buyTicketBtn.style.display = 'none';
                    buyTonBtn.style.display = 'none';
                    tapArea.style.opacity = '1';
                    tapArea.style.pointerEvents = 'auto';
                    tg.showAlert('✅ Присоединились к игре!');
                    
                    if (data.players_count >= selectedGameConfig.max_players && !gameStarted) {
                        startGame();
                    }
                } else {
                    tg.showAlert('❌ Не удалось присоединиться к игре');
                }
            } catch(e) {
                console.error('Join direct error:', e);
            }
        }
        
        async function forceJoinGame() {
    try {
        const response = await fetch(`/api/game/${currentGameId}/join`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId })
        });
        const data = await response.json();
        console.log('Force join result:', data);
        
        if (data.success) {
            console.log('✅ Successfully joined game');
            await refreshGameState();
            
            const game = await refreshGameState();
            if (game && game.players_count >= game.max_players && !gameStarted) {
                startGame();
            }
        } else {
            console.error('Failed to join game:', data.error);
        }
    } catch(e) {
        console.error('Force join error:', e);
    }
}
                        
        
        function startGame() {
            gameActive = true;
            gameStarted = true;
            gameStatusSpan.className = 'game-status playing';
            gameStatusSpan.innerHTML = '🎮 ИГРА ИДЁТ! ТАПАЙ! 🎮';
            playGameStartSound();
            startTimer();
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                if (timeLeft > 0) {
                    timeLeft--;
                    timerSpan.textContent = `⏱️ ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
                }
                if (timeLeft <= 0) endGame();
            }, 1000);
        }
        
        async function endGame() {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            tapArea.style.pointerEvents = 'none';
            tapArea.style.opacity = '0.5';
            gameStatusSpan.className = 'game-status ended';
            gameStatusSpan.innerHTML = '🏁 Игра окончена! 🏁';
            playGameEndSound();
            
            try {
                await fetch('/api/update-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, username: username, full_name: fullName, score: score })
                });
            } catch(e) {}
            
            tg.showAlert(`Игра окончена!\nВаш результат: ${score} тапов!`);
            await loadBalance();
        }
        
        async function getCurrentGame() {
            try {
                const response = await fetch('/api/game/current');
                const data = await response.json();
                playersCountSpan.textContent = data.players_count || 0;
                return data;
            } catch(e) { console.error(e); }
        }
        
        let updateGameInfoInterval = null;
        async function updateGameInfo() {
            const game = await getCurrentGame();
            if (game && game.players_count >= selectedGameConfig.max_players && !gameStarted) startGame();
        }
        
        async function getLeaderboard() {
            try {
                const response = await fetch('/api/leaderboard');
                const data = await response.json();
                if (data.leaders) {
                    leaderboardDiv.innerHTML = '';
                    data.leaders.slice(0, 10).forEach((player, idx) => {
                        const item = document.createElement('div');
                        item.className = 'leaderboard-item';
                        if (idx === 0) item.classList.add('top-1');
                        else if (idx === 1) item.classList.add('top-2');
                        else if (idx === 2) item.classList.add('top-3');
                        let medal = idx === 0 ? '🥇 ' : idx === 1 ? '🥈 ' : idx === 2 ? '🥉 ' : '';
                        item.innerHTML = `<span>${medal}${idx+1}. ${player.full_name || player.username}</span><span>${player.score || 0} 👆</span>`;
                        leaderboardDiv.appendChild(item);
                    });
                }
            } catch(e) { console.error(e); }
        }
        
        // Вывод средств
        async function loadWithdrawHistory() {
            try {
                const response = await fetch(`/api/withdraw/history/${userId}`);
                const data = await response.json();
                const historyList = document.getElementById('withdraw-history-list');
                if (data.history && data.history.length > 0) {
                    historyList.innerHTML = '';
                    data.history.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'withdraw-history-item';
                        let statusClass = '', statusText = '';
                        if (item.status === 'pending') { statusClass = 'withdraw-status-pending'; statusText = '⏳ Обрабатывается'; }
                        else if (item.status === 'completed') { statusClass = 'withdraw-status-completed'; statusText = '✅ Выполнен'; }
                        else { statusClass = 'withdraw-status-cancelled'; statusText = '❌ Отменён'; }
                        div.innerHTML = `<span>${item.amount} ⭐</span><span class="${statusClass}">${statusText}</span><span style="font-size:12px;">${new Date(item.created_at).toLocaleDateString()}</span>`;
                        historyList.appendChild(div);
                    });
                } else {
                    historyList.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">Нет запросов</div>';
                }
            } catch(e) { console.error(e); }
        }
        
        async function requestWithdraw() {
            const amount = parseInt(document.getElementById('withdraw-amount').value);
            if (!amount || amount < 100) {
                tg.showAlert('❌ Минимальная сумма вывода: 100 ⭐');
                return;
            }
            if (amount > currentBalance) {
                tg.showAlert('❌ Недостаточно звезд');
                return;
            }
            
            tg.showPopup({
                title: 'Подтверждение',
                message: `Вывести ${amount} ⭐?`,
                buttons: [{id:'confirm',type:'default',text:'✅ Да'},{id:'cancel',type:'cancel',text:'Отмена'}]
            }, async (buttonId) => {
                if (buttonId === 'confirm') {
                    try {
                        const response = await fetch('/api/withdraw/request', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: userId, amount: amount })
                        });
                        const data = await response.json();
                        if (data.success) {
                            tg.showAlert(data.message);
                            await loadBalance();
                            await loadWithdrawHistory();
                            document.getElementById('withdraw-amount').value = '';
                            closeWithdrawModal();
                        } else {
                            tg.showAlert('❌ ' + (data.error || 'Ошибка'));
                        }
                    } catch(e) { tg.showAlert('❌ Ошибка'); }
                }
            });
        }
        
        const withdrawModal = document.getElementById('withdraw-modal');
        const withdrawBtn = document.getElementById('withdraw-btn');
        
        function openWithdrawModal() {
            withdrawModal.classList.add('active');
            document.getElementById('withdraw-balance').textContent = `${currentBalance} ⭐`;
            loadWithdrawHistory();
            const amountInput = document.getElementById('withdraw-amount');
            const netSpan = document.getElementById('withdraw-net');
            amountInput.oninput = () => { netSpan.textContent = `${parseInt(amountInput.value) || 0} ⭐`; };
        }
        
        function closeWithdrawModal() { withdrawModal.classList.remove('active'); }
        
        if (withdrawBtn) withdrawBtn.onclick = openWithdrawModal;
        document.getElementById('withdraw-modal-close').onclick = closeWithdrawModal;
        document.getElementById('submit-withdraw-btn').onclick = requestWithdraw;
        withdrawModal.onclick = (e) => { if (e.target === withdrawModal) closeWithdrawModal(); };
        
        tapArea.addEventListener('click', (e) => {
            if (!gameActive) return;
            score++;
            scoreSpan.textContent = score;
            playTapSound();
            const rect = tapArea.getBoundingClientRect();
            createFloatingScore(rect.left + rect.width/2, rect.top + rect.height/2);
            if (score % 10 === 0) {
                fetch('/api/update-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, username: username, full_name: fullName, score: score })
                }).catch(e => console.error);
            }
        });
        
        backBtn.onclick = () => {
            if (timerInterval) clearInterval(timerInterval);
            if (updateGameInfoInterval) clearInterval(updateGameInfoInterval);
            gameActive = false; gameStarted = false; score = 0; scoreSpan.textContent = '0';
            selectorScreen.classList.remove('hide');
            gameScreen.classList.remove('active');
            loadGameTypes();
        };
        
        document.body.addEventListener('click', () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); });
        
        // Инициализация
        loadGameTypes();
        loadBalance();
        initTonConnect();
        setInterval(getLeaderboard, 3000);
        setInterval(loadBalance, 10000);
    </script>
</body>
</html>
