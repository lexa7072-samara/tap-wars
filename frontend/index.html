<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tap Wars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* Анимации */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(240, 147, 251, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(240, 147, 251, 0); }
            100% { box-shadow: 0 0 0 0 rgba(240, 147, 251, 0); }
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(20deg); opacity: 0; }
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes hit {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        @keyframes winnerGlow {
            0% { box-shadow: 0 0 5px #ffd700; }
            50% { box-shadow: 0 0 30px #ffd700; }
            100% { box-shadow: 0 0 5px #ffd700; }
        }
        
        /* Экран выбора игры */
        .selector-screen {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        .selector-screen.hide {
            display: none;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 32px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            animation: bounce 2s ease infinite;
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        
        .game-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .game-card:active {
            transform: scale(0.98);
        }
        
        .game-card.mini {
            border-left: 5px solid #00b894;
        }
        
        .game-card.standard {
            border-left: 5px solid #0984e3;
        }
        
        .game-card.vip {
            border-left: 5px solid #6c5ce7;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .game-title {
            font-size: 24px;
            font-weight: bold;
        }
        
        .game-price {
            font-size: 20px;
            font-weight: bold;
            background: #fdcb6e;
            padding: 5px 12px;
            border-radius: 20px;
            color: #2d3436;
        }
        
        .game-stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #2d3436;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        
        .prize {
            color: #00b894;
        }
        
        .game-description {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        .join-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .join-btn:active {
            transform: scale(0.98);
        }
        
        /* Экран игры */
        .game-screen {
            display: none;
        }
        
        .game-screen.active {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .back-btn:active {
            background: rgba(255,255,255,0.3);
        }
        
        .player-info {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 14px;
        }
        
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.9);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #2d3436;
        }
        
        .timer {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            color: #fdcb6e;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-family: monospace;
        }
        
        .timer.warning {
            color: #ff6b6b;
            animation: shake 0.5s ease;
        }
        
        .timer.critical {
            color: #ff6b6b;
            animation: pulse-glow 1s infinite;
        }
        
        .game-status {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .game-status.waiting {
            background: #ffeaa7;
            color: #d63031;
        }
        
        .game-status.playing {
            background: #55efc4;
            color: #006266;
            animation: pulse-glow 1.5s infinite;
        }
        
        .game-status.ended {
            background: #dfe6e9;
            color: #2d3436;
        }
        
        .tap-area {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.05s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }
        
        .tap-area.tap-effect {
            transform: scale(0.9);
            animation: hit 0.1s ease;
        }
        
        .score {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: white;
        }
        
        .score span {
            font-size: 48px;
            color: #fdcb6e;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        /* Всплывающие очки */
        .floating-score {
            position: fixed;
            font-size: 28px;
            font-weight: bold;
            color: #fdcb6e;
            text-shadow: 0 0 5px #ff6b6b;
            pointer-events: none;
            z-index: 1000;
            animation: float 1s ease-out forwards;
        }
        
        /* Эффект частиц */
        .particle {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            animation: float 0.8s ease-out forwards;
        }
        
        .leaderboard {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .leaderboard h3 {
            margin-bottom: 10px;
            text-align: center;
            color: #2d3436;
        }
        
        .leaderboard-list {
            max-height: 250px;
            overflow-y: auto;
        }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        
        .leaderboard-item.top-1 {
            background: linear-gradient(90deg, #ffd70020, transparent);
            animation: winnerGlow 1s infinite;
        }
        
        .leaderboard-item.top-2 {
            background: linear-gradient(90deg, #c0c0c020, transparent);
        }
        
        .leaderboard-item.top-3 {
            background: linear-gradient(90deg, #cd7f3220, transparent);
        }
        
        button {
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .buy-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .share-btn {
            background: linear-gradient(135deg, #00b894 0%, #55efc4 100%);
        }
        
        .restart-btn {
            background: #ff6b6b;
        }
        
        /* Звуковой индикатор */
        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        
        .sound-toggle:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Экран выбора игры -->
        <div id="selector-screen" class="selector-screen">
            <h1>⚡ TAP WARS ⚡</h1>
            <div id="games-list"></div>
        </div>
        
        <!-- Экран игры -->
        <div id="game-screen" class="game-screen">
            <button class="back-btn" id="back-btn">← Назад</button>
            
            <div class="player-info" id="player-info"></div>
            
            <div class="stats-panel">
                <div class="stat">
                    <div class="stat-label">💰 Баланс</div>
                    <div class="stat-value" id="balance">0 ⭐</div>
                </div>
                <div class="stat">
                    <div class="stat-label">👥 Игроки</div>
                    <div class="stat-value"><span id="players-count">0</span>/<span id="max-players">0</span></div>
                </div>
                <div class="stat">
                    <div class="stat-label">🏆 Приз</div>
                    <div class="stat-value" id="prize-pool">0 ⭐</div>
                </div>
            </div>
            
            <div class="timer" id="timer">⏱️ 00:00</div>
            
            <div class="game-status waiting" id="game-status">⏳ Ожидание игроков...</div>
            
            <div class="tap-area" id="tap-area">👆</div>
            
            <div class="score">🎯 Счёт: <span id="score">0</span></div>
            
            <button class="buy-btn" id="buy-ticket-btn" style="display: none;">🎫 Купить билет</button>
            
            <div class="leaderboard">
                <h3>🏆 Топ игроков</h3>
                <div class="leaderboard-list" id="leaderboard-list">Загрузка...</div>
            </div>
        </div>
    </div>
    
    <!-- Звуковой индикатор -->
    <div class="sound-toggle" id="sound-toggle">🔊</div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Настройки звука
        let soundEnabled = true;
        const soundToggle = document.getElementById('sound-toggle');
        
        // Создание аудио контекста (Web Audio API для генерации звуков)
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx && soundEnabled) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playTapSound() {
            if (!soundEnabled) return;
            try {
                initAudio();
                if (audioCtx) {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.frequency.value = 800;
                    gainNode.gain.value = 0.1;
                    oscillator.type = 'sine';
                    oscillator.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                }
            } catch(e) { console.log('Audio error:', e); }
        }
        
        function playGameStartSound() {
            if (!soundEnabled) return;
            try {
                initAudio();
                if (audioCtx) {
                    const now = audioCtx.currentTime;
                    const frequencies = [523.25, 587.33, 659.25, 783.99];
                    frequencies.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        gain.gain.value = 0.1;
                        osc.type = 'sine';
                        osc.start(now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.00001, now + i * 0.1 + 0.3);
                        osc.stop(now + i * 0.1 + 0.3);
                    });
                }
            } catch(e) { console.log('Audio error:', e); }
        }
        
        function playGameEndSound() {
            if (!soundEnabled) return;
            try {
                initAudio();
                if (audioCtx) {
                    const now = audioCtx.currentTime;
                    const frequencies = [783.99, 659.25, 523.25];
                    frequencies.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        gain.gain.value = 0.1;
                        osc.type = 'sine';
                        osc.start(now + i * 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.00001, now + i * 0.15 + 0.5);
                        osc.stop(now + i * 0.15 + 0.5);
                    });
                }
            } catch(e) { console.log('Audio error:', e); }
        }
        
        function playWinSound() {
            if (!soundEnabled) return;
            try {
                initAudio();
                if (audioCtx) {
                    const now = audioCtx.currentTime;
                    const frequencies = [523.25, 659.25, 783.99, 1046.50];
                    frequencies.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        gain.gain.value = 0.15;
                        osc.type = 'sine';
                        osc.start(now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.00001, now + i * 0.1 + 0.4);
                        osc.stop(now + i * 0.1 + 0.4);
                    });
                }
            } catch(e) { console.log('Audio error:', e); }
        }
        
        soundToggle.onclick = () => {
            soundEnabled = !soundEnabled;
            soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
            tg.showAlert(soundEnabled ? '🔊 Звук включён' : '🔇 Звук выключен');
        };
        
        // Функции анимации
        function createFloatingScore(x, y, value) {
            const el = document.createElement('div');
            el.className = 'floating-score';
            el.textContent = `+${value}`;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        
        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + (Math.random() - 0.5) * 40 + 'px';
                particle.style.top = y + (Math.random() - 0.5) * 40 + 'px';
                particle.style.background = `hsl(${Math.random() * 60 + 300}, 70%, 60%)`;
                particle.style.width = Math.random() * 8 + 4 + 'px';
                particle.style.height = particle.style.width;
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
        }
        
        function updateTimerDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerSpan.textContent = `⏱️ ${mins}:${secs.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 10 && timeLeft > 5) {
                timerSpan.classList.add('warning');
            } else if (timeLeft <= 5 && timeLeft > 0) {
                timerSpan.classList.remove('warning');
                timerSpan.classList.add('critical');
            } else {
                timerSpan.classList.remove('warning', 'critical');
            }
        }
        
        const userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 10000);
        const username = tg.initDataUnsafe?.user?.username || 'Player';
        const firstName = tg.initDataUnsafe?.user?.first_name || '';
        const lastName = tg.initDataUnsafe?.user?.last_name || '';
        const fullName = (firstName + ' ' + lastName).trim() || username;
        
        let selectedGameType = null;
        let selectedGameConfig = null;
        let currentGameId = null;
        let score = 0;
        let gameActive = false;
        let hasTicket = false;
        let timeLeft = 60;
        let timerInterval = null;
        let gameStarted = false;
        let combo = 0;
        let comboTimeout = null;
        
        const selectorScreen = document.getElementById('selector-screen');
        const gameScreen = document.getElementById('game-screen');
        const gamesList = document.getElementById('games-list');
        const backBtn = document.getElementById('back-btn');
        const tapArea = document.getElementById('tap-area');
        const scoreSpan = document.getElementById('score');
        const timerSpan = document.getElementById('timer');
        const gameStatusSpan = document.getElementById('game-status');
        const playersCountSpan = document.getElementById('players-count');
        const maxPlayersSpan = document.getElementById('max-players');
        const prizePoolSpan = document.getElementById('prize-pool');
        const buyTicketBtn = document.getElementById('buy-ticket-btn');
        const leaderboardDiv = document.getElementById('leaderboard-list');
        const playerInfoSpan = document.getElementById('player-info');
        
        playerInfoSpan.innerHTML = `👤 ${fullName} (@${username})`;
        
        async function loadGameTypes() {
            try {
                const response = await fetch('/api/game/types');
                const data = await response.json();
                displayGames(data.types);
            } catch(e) {
                displayGames({
                    mini: { name: "Мини", emoji: "🟢", ticket_price: 10, max_players: 10, prize_pool: 60, duration: 30, description: "Быстрая игра" },
                    standard: { name: "Стандарт", emoji: "🔵", ticket_price: 50, max_players: 20, prize_pool: 750, duration: 60, description: "Классическая битва" },
                    vip: { name: "VIP", emoji: "🟣", ticket_price: 100, max_players: 10, prize_pool: 750, duration: 60, description: "Элитная игра" }
                });
            }
        }
        
        function displayGames(types) {
            gamesList.innerHTML = '';
            const order = ['mini', 'standard', 'vip'];
            for (const key of order) {
                if (!types[key]) continue;
                const config = types[key];
                const card = document.createElement('div');
                card.className = `game-card ${key}`;
                card.innerHTML = `
                    <div class="game-header">
                        <span class="game-title">${config.emoji} ${config.name}</span>
                        <span class="game-price">${config.ticket_price} ⭐</span>
                    </div>
                    <div class="game-stats">
                        <div class="stat-item">
                            <div class="stat-value">${config.max_players}</div>
                            <div class="stat-label">игроков</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value prize">${config.prize_pool} ⭐</div>
                            <div class="stat-label">призовой фонд</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${config.duration} сек</div>
                            <div class="stat-label">длительность</div>
                        </div>
                    </div>
                    <div class="game-description">${config.description}</div>
                    <button class="join-btn" data-type="${key}">Выбрать</button>
                `;
                const joinBtn = card.querySelector('.join-btn');
                joinBtn.onclick = () => selectGame(key, config);
                gamesList.appendChild(card);
            }
        }
        
        async function selectGame(type, config) {
            selectedGameType = type;
            selectedGameConfig = config;
            
            try {
                const response = await fetch('/api/game/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ game_type: type })
                });
                const data = await response.json();
                currentGameId = data.game_id;
            } catch(e) {
                currentGameId = Date.now();
            }
            
            await checkTicket();
            
            selectorScreen.classList.add('hide');
            gameScreen.classList.add('active');
            
            maxPlayersSpan.textContent = config.max_players;
            prizePoolSpan.textContent = config.prize_pool;
            timeLeft = config.duration;
            updateTimerDisplay();
            
            await getCurrentGame();
            updateGameInfoInterval = setInterval(updateGameInfo, 2000);
        }
        
        async function checkTicket() {
            hasTicket = false;
            if (!hasTicket) {
                buyTicketBtn.style.display = 'block';
                buyTicketBtn.textContent = `🎫 Купить билет (${selectedGameConfig.ticket_price} ⭐)`;
                buyTicketBtn.classList.remove('disabled');
                tapArea.style.opacity = '0.5';
                tapArea.style.pointerEvents = 'none';
            } else {
                buyTicketBtn.style.display = 'none';
                tapArea.style.opacity = '1';
                tapArea.style.pointerEvents = 'auto';
                await joinGame();
            }
        }
        
        buyTicketBtn.onclick = async () => {
            if (buyTicketBtn.classList.contains('disabled')) return;
            buyTicketBtn.classList.add('disabled');
            buyTicketBtn.textContent = '⏳ Обработка...';
            
            try {
                const response = await fetch('/api/payment/create-invoice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        game_id: currentGameId,
                        amount: selectedGameConfig.ticket_price
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.invoice_link) {
                    tg.openInvoice(data.invoice_link, async (status) => {
                        if (status === 'paid') {
                            tg.showAlert('✅ Билет куплен!');
                            hasTicket = true;
                            buyTicketBtn.style.display = 'none';
                            tapArea.style.opacity = '1';
                            tapArea.style.pointerEvents = 'auto';
                            await joinGame();
                        } else {
                            buyTicketBtn.classList.remove('disabled');
                            buyTicketBtn.textContent = `🎫 Купить билет (${selectedGameConfig.ticket_price} ⭐)`;
                        }
                    });
                } else {
                    tg.showAlert('❌ Ошибка при создании инвойса');
                    buyTicketBtn.classList.remove('disabled');
                    buyTicketBtn.textContent = `🎫 Купить билет (${selectedGameConfig.ticket_price} ⭐)`;
                }
            } catch(e) {
                console.error('Buy ticket error:', e);
                tg.showAlert('❌ Ошибка соединения');
                buyTicketBtn.classList.remove('disabled');
                buyTicketBtn.textContent = `🎫 Купить билет (${selectedGameConfig.ticket_price} ⭐)`;
            }
        };
        
        async function joinGame() {
            try {
                const response = await fetch(`/api/game/${currentGameId}/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await response.json();
                if (data.success) {
                    if (data.players_count >= selectedGameConfig.max_players && !gameStarted) {
                        startGame();
                    }
                }
            } catch(e) {
                console.error('Join error:', e);
            }
        }
        
        function startGame() {
            gameActive = true;
            gameStarted = true;
            gameStatusSpan.className = 'game-status playing';
            gameStatusSpan.innerHTML = '🎮 ИГРА ИДЁТ! ТАПАЙ! 🎮';
            playGameStartSound();
            startTimer();
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                }
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }
        
        async function endGame() {
            gameActive = false;
            gameStarted = false;
            if (timerInterval) clearInterval(timerInterval);
            tapArea.style.pointerEvents = 'none';
            tapArea.style.opacity = '0.5';
            gameStatusSpan.className = 'game-status ended';
            gameStatusSpan.innerHTML = '🏁 Игра окончена! 🏁';
            
            playGameEndSound();
            await updateScore();
            
            tg.showAlert(`🏁 Игра окончена!\n📊 Ваш результат: ${score} тапов!`);
        }
        
        async function updateScore() {
            try {
                await fetch('/api/update-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_id: userId, 
                        username: username,
                        full_name: fullName,
                        score: score 
                    })
                });
            } catch(e) {
                console.error('Update error:', e);
            }
        }
        
        async function getCurrentGame() {
            try {
                const response = await fetch('/api/game/current');
                const data = await response.json();
                playersCountSpan.textContent = data.players_count || 0;
                return data;
            } catch(e) {
                console.error('Get game error:', e);
            }
        }
        
        let updateGameInfoInterval = null;
        async function updateGameInfo() {
            const game = await getCurrentGame();
            if (game && game.players_count >= selectedGameConfig.max_players && !gameStarted) {
                startGame();
            }
        }
        
        async function getLeaderboard() {
            try {
                const response = await fetch('/api/leaderboard');
                const data = await response.json();
                if (data.leaders) {
                    leaderboardDiv.innerHTML = '';
                    data.leaders.slice(0, 10).forEach((player, index) => {
                        const item = document.createElement('div');
                        item.className = 'leaderboard-item';
                        if (index === 0) item.classList.add('top-1');
                        else if (index === 1) item.classList.add('top-2');
                        else if (index === 2) item.classList.add('top-3');
                        
                        let medal = '';
                        if (index === 0) medal = '🥇 ';
                        else if (index === 1) medal = '🥈 ';
                        else if (index === 2) medal = '🥉 ';
                        item.innerHTML = `
                            <span>${medal}${index + 1}. ${player.full_name || player.username}</span>
                            <span>${player.score || 0} 👆</span>
                        `;
                        leaderboardDiv.appendChild(item);
                    });
                }
            } catch(e) {
                console.error('Leaderboard error:', e);
            }
        }
        
        // Обработка тапа с анимациями и звуком
        tapArea.addEventListener('click', (e) => {
            if (!gameActive) return;
            
            score++;
            scoreSpan.textContent = score;
            
            // Звук тапа
            playTapSound();
            
            // Анимация тап-области
            tapArea.classList.add('tap-effect');
            setTimeout(() => tapArea.classList.remove('tap-effect'), 100);
            
            // Всплывающие очки
            const rect = tapArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            createFloatingScore(centerX, centerY, 1);
            createParticles(centerX, centerY);
            
            // Комбо эффект
            if (comboTimeout) clearTimeout(comboTimeout);
            combo++;
            if (combo >= 10) {
                tapArea.style.boxShadow = '0 0 30px #ffd700';
                setTimeout(() => tapArea.style.boxShadow = '', 200);
            }
            comboTimeout = setTimeout(() => { combo = 0; }, 1000);
            
            if (score % 10 === 0) updateScore();
            if (score % 50 === 0 && score > 0) playWinSound();
        });
        
        backBtn.onclick = () => {
            if (timerInterval) clearInterval(timerInterval);
            if (updateGameInfoInterval) clearInterval(updateGameInfoInterval);
            gameActive = false;
            gameStarted = false;
            score = 0;
            combo = 0;
            scoreSpan.textContent = '0';
            selectorScreen.classList.remove('hide');
            gameScreen.classList.remove('active');
            loadGameTypes();
        };
        
        loadGameTypes();
        setInterval(getLeaderboard, 3000);
        
        // Инициализация аудио по первому тапу (требование браузера)
        document.body.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });
    </script>
</body>
</html>
